<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield background -->
  <path d="M50 10 L80 25 L80 50 Q80 70 50 90 Q20 70 20 50 L20 25 Z" 
        fill="url(#grad1)" stroke="#2C5F8D" stroke-width="2"/>
  
  <!-- Privacy icon - eye with slash -->
  <g transform="translate(50, 45)">
    <!-- Eye outline -->
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="none" stroke="white" stroke-width="2.5"/>
    
    <!-- Pupil -->
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.8"/>
    
    <!-- Slash across eye -->
    <line x1="-22" y1="-15" x2="22" y2="15" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Lock icon at bottom -->
  <g transform="translate(50, 70)">
    <rect x="-6" y="0" width="12" height="10" rx="1" fill="white" opacity="0.9"/>
    <path d="M -4 0 L -4 -4 Q -4 -7 0 -7 Q 4 -7 4 -4 L 4 0" 
          fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
  </g>
</svg>
